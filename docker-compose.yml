services:
  db:
    image: postgres:16-alpine
    container_name: ailin-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ailin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ailin}
      POSTGRES_DB: ${POSTGRES_DB:-ailin_cinema}
    ports:
      # 5433 на хосте, чтобы не конфликтовать с локально установленным PostgreSQL (5432)
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ailin} -d ${POSTGRES_DB:-ailin_cinema}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
